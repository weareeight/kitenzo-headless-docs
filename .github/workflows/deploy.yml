name: Deploy to GitHub Pages

on:
  # Deploy on every push to main
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Allow this workflow to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress production deploys
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        # Builds the site and uploads the dist/ artifact for Pages.
        uses: withastro/action@v3
        with:
          # Astro 6 / @astrojs/mdx require Node >= 22.12.
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
